services:
  drawai:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - 3000
    environment:
      - PORT=3000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - HOST_PASSWORD=${HOST_PASSWORD:-admin123}
