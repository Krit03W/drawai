<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Host — AI Can't Guess This! 🎛️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HOST LOGIN -->
  <div class="screen active" id="screen-login">
    <div class="center-wrap">
      <h1 class="logo">🎛️ Host Control</h1>
      <p class="tagline">AI Can't Guess This!</p>
      <div class="card">
        <label>รหัสผ่านโฮสต์</label>
        <input type="password" id="hostPassword" placeholder="รหัสผ่านโฮสต์">
        <div style="margin-top:18px">
          <button class="btn big" id="hostLoginBtn" style="width:100%">เข้าสู่ระบบ</button>
        </div>
        <p class="error" id="loginError"></p>
      </div>
    </div>
  </div>

  <!-- HOST MAIN -->
  <div class="screen" id="screen-main">
    <div class="results-wrap">
      <div class="topbar">
        <h1 class="logo" style="font-size:1.6rem">🎨 AI Can't Guess This!</h1>
        <span class="badge">รอบที่ <b id="roundNum">0</b> · สถานะ: <b id="phaseLabel">-</b></span>
        <span class="badge" id="aiBadge"></span>
        <div class="timer" id="hostTimer">--</div>
      </div>

      <div class="card" style="margin-bottom:16px">
        <div style="display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap">
          <div>
            <label>เวลาวาด (วินาที)</label>
            <input type="number" id="drawSeconds" value="120" min="30" max="600" style="width:120px">
          </div>
          <div>
            <label>เวลาทาย (วินาที)</label>
            <input type="number" id="guessSeconds" value="45" min="15" max="300" style="width:120px">
          </div>
          <div>
            <label>ความยากของคำ</label>
            <select id="difficulty" style="width:230px">
              <option value="1">1 · ง่ายมาก 🍼</option>
              <option value="2" selected>2 · ง่าย 🙂</option>
              <option value="3">3 · ปานกลาง 🤔</option>
              <option value="4">4 · ยาก 🥵</option>
              <option value="5">5 · ไม่น่าจะวาดได้ 💀</option>
            </select>
          </div>
          <button class="btn big" id="startBtn">▶️ เริ่มรอบใหม่</button>
          <button class="btn secondary" id="forceBtn">⏭ ข้ามเฟสนี้</button>
          <span class="spacer"></span>
          <button class="btn danger" id="resetBtn">🔄 เริ่มเกมใหม่ (ล้างคะแนน)</button>
        </div>
      </div>

      <div class="card">
        <div class="board-title">🏆 ตารางคะแนนสด</div>
        <div id="hostBoard" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:6px"></div>
      </div>

      <div class="results-grid" id="resultsGrid"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="host.js"></script>
</body>
</html>
